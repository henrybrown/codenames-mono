name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # CI — quality gate (runs on every push and PR)
  # ─────────────────────────────────────────────
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: codenames_test
          POSTGRES_USER: codenames
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codenames -d codenames_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build --workspace=shared

      # ── Static analysis ──

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --max-warnings=0
        continue-on-error: true

      # ── Unit + component tests ──

      - name: Backend tests
        run: npm run test --workspace=backend
        env:
          DATABASE_URL: postgresql://codenames:test_password@localhost:5432/codenames_test
          JWT_SECRET: test-jwt-secret-for-ci-only-not-real
          NODE_ENV: test
          LLM_URL: http://localhost:11434
          LLM_MODEL: test
          LLM_TEMPERATURE: "0.5"
          LLM_NUM_CTX: "4096"
          LOG_FILE_LEVEL: error
          LOG_CONSOLE_LEVEL: error
          LOG_HTTP_REQUESTS: "false"
          LOG_HTTP_VERBOSE: "false"
          LOG_HTTP_TO_CONSOLE: "false"
          LOG_FILE_PATH: ./logs
          PORT: "3000"

      - name: Frontend tests
        run: npm run test --workspace=frontend

      # ── Build frontend ──

      - name: Build frontend
        run: npx --workspace=frontend vite build

      - name: Build backend
        run: npm run build --workspace=backend

      # ── E2E tests ──
      # Sets up the database schema, starts the backend, serves the frontend,
      # then runs Playwright against the running app

      - name: Setup test database
        run: psql -h localhost -U codenames -d codenames_test -f backend/deploy/sql.sql
        env:
          PGPASSWORD: test_password

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start backend for e2e
        run: |
          cd backend
          touch .env
          node dist/src/index.js &
          echo $! > /tmp/backend.pid
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Backend failed to start within 15 seconds"
              exit 1
            fi
            sleep 0.5
          done
        env:
          DATABASE_URL: postgresql://codenames:test_password@localhost:5432/codenames_test
          JWT_SECRET: test-jwt-secret-for-ci-only-not-real
          NODE_ENV: test
          LLM_URL: http://localhost:11434
          LLM_MODEL: test
          LLM_TEMPERATURE: "0.5"
          LLM_NUM_CTX: "4096"
          LOG_FILE_LEVEL: error
          LOG_CONSOLE_LEVEL: error
          LOG_HTTP_REQUESTS: "false"
          LOG_HTTP_VERBOSE: "false"
          LOG_HTTP_TO_CONSOLE: "false"
          LOG_FILE_PATH: ./logs
          PORT: "3000"
          CORS_ORIGINS: "http://localhost:8000"

      - name: Start frontend for e2e
        run: |
          cd frontend
          npx vite --port 8000 &
          echo $! > /tmp/frontend.pid
          sleep 3

      - name: Run e2e tests
        run: npx playwright test --config=frontend/test/e2e/playwright.config.ts

      - name: Stop background services
        if: always()
        run: |
          kill $(cat /tmp/backend.pid) 2>/dev/null || true
          kill $(cat /tmp/frontend.pid) 2>/dev/null || true

      # ── Upload frontend build for deploy job ──

      - name: Upload frontend build
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # CD — deploy (only runs on push to master, only if CI passes)
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build --workspace=shared

      # Download the frontend build from the CI job instead of rebuilding
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CODENAMES_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.CODENAMES_DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env.production' \
            --exclude='infra/certbot' \
            --exclude='dottify' \
            --exclude='.DS_Store' \
            --exclude='infra/terraform' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.CODENAMES_DEPLOY_HOST }}:/opt/codenames-mono/

      - name: Ensure SSL certs exist
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.CODENAMES_DEPLOY_HOST }} << 'EOF'
            CERT_DIR="/opt/codenames-mono/infra/certbot/conf/live/codenames.hbprojects.app"
            if [ ! -d "$CERT_DIR" ]; then
              echo "No SSL certs found — generating with Certbot..."
              cd /opt/codenames-mono/infra
              docker compose -f docker-compose.prod.yml stop nginx 2>/dev/null || true
              mkdir -p /opt/codenames-mono/infra/certbot/conf
              docker run --rm -p 80:80 \
                -v /opt/codenames-mono/infra/certbot/conf:/etc/letsencrypt \
                certbot/certbot certonly \
                --standalone \
                --non-interactive \
                -d codenames.hbprojects.app \
                --agree-tos \
                -m henry.e.brown@icloud.com
              echo "SSL certs generated successfully"
            else
              echo "SSL certs already exist — skipping"
            fi
          EOF

      - name: Write env file
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.CODENAMES_DEPLOY_HOST }} << EOF
            cat > /opt/codenames-mono/.env.production << 'ENVFILE'
          POSTGRES_DB=codenames
          POSTGRES_USER=codenames
          POSTGRES_PASSWORD=${{ secrets.CODENAMES_POSTGRES_PASSWORD }}
          JWT_SECRET=${{ secrets.CODENAMES_JWT_SECRET }}
          LLM_PROVIDER=gemini
          LLM_API_KEY=${{ secrets.CODENAMES_LLM_API_KEY }}
          LLM_URL=https://generativelanguage.googleapis.com
          LLM_MODEL=gemini-2.5-flash
          LLM_TEMPERATURE=0.5
          LLM_NUM_CTX=4096
          CORS_ORIGINS=https://codenames.hbprojects.app
          NODE_ENV=production
          LOG_FILE_LEVEL=info
          LOG_CONSOLE_LEVEL=info
          LOG_HTTP_REQUESTS=true
          LOG_HTTP_VERBOSE=false
          LOG_HTTP_TO_CONSOLE=false
          LOG_FILE_PATH=./logs
          PORT=3000
          ENVFILE
          EOF

      - name: Restart services
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.CODENAMES_DEPLOY_HOST }} << 'EOF'
            cd /opt/codenames-mono/infra
            docker compose -f docker-compose.prod.yml --env-file ../.env.production up --build -d
          EOF
